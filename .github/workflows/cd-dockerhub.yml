name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install dependencies
        # This tells GitHub to enter your folder before running npm
        run: npm install
        working-directory: ./smart-money-blog 

      - name: Run tests
        run: npm test
        working-directory: ./smart-money-blog

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          # This tells Docker to look inside your folder for the Dockerfile
          context: ./smart-money-blog
          push: true
          tags: joelord1/smart-money-blog:latest
