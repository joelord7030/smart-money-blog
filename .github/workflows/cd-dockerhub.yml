## CD to dockerhub



name: CD to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - run: npm test

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ joelord1 }}
          password: ${{ Adesunloye2003$ }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: joelord1/smart-money-blog:latest
